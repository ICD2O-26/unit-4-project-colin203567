<!DOCTYPE html>
<html>
<head>
    <title>Futuristic IoT Smart Home</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6e6e6;
            margin: 0;
            padding: 0;
            transition: background 0.4s, color 0.4s;
        }

        /* Floating Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 25px;
            z-index: 1000;
            border-bottom: 1px solid #4c8bff;
        }

        .navbar a {
            color: #9fc5ff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #4c8bff;
        }

        /* Page Content */
        .content {
            padding: 100px 20px 40px;
        }

        h1 {
            text-align: center;
            font-size: 45px;
            color: #4c8bff;
            text-shadow: 0 0 10px #4c8bff;
        }

        h2 {
            color: #7ab8ff;
            border-left: 5px solid #4c8bff;
            padding-left: 10px;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            margin: 25px 0;
            border-radius: 12px;
            border: 1px solid rgba(76, 139, 255, 0.3);
            box-shadow: 0 0 15px rgba(76, 139, 255, 0.1);
            transition: 0.3s;
        }

        .section:hover {
            box-shadow: 0 0 25px rgba(76, 139, 255, 0.3);
        }

        img {
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            display: block;
            margin: 15px auto;
            box-shadow: 0 0 15px rgba(76, 139, 255, 0.4);
        }

        /* Dark Mode Toggle Button */
        .toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4c8bff;
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            box-shadow: 0 0 15px #4c8bff;
            transition: 0.3s;
        }

        .toggle-btn:hover {
            background: #2a5bbf;
        }

        /* Light Mode */
        .light-mode {
            background: #f4f8ff;
            color: #1a1a1a;
        }

        .light-mode .section {
            background: white;
            border-color: #4c8bff;
        }
